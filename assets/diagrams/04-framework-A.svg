<rect x="520.0" y="302.0" width="285.0" height="56" rx="4" class="box"></rect>
<text x="662.5" y="335.0" class="label" text-anchor="middle">think</text>
<rect x="520.0" y="372.0" width="285.0" height="56" rx="4" class="box"></rect>

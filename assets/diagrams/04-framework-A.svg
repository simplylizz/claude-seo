<rect x="520.0" y="442.0" width="285.0" height="56" rx="4" class="box"></rect>
<text x="662.5" y="475.0" class="label" text-anchor="middle">connect-system</text>
<rect x="880.0" y="145.0" width="315.0" height="110" rx="4" class="box"></rect>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Check Python syntax
        # Glob over every tracked script so the check never drifts as scripts
        # are added or removed. py_compile is a pure parse — no deps needed.
        run: python3 -m py_compile scripts/*.py

  test:
    name: Test suite (manifests + sync_flow)
    runs-on: ubuntu-latest
    env:
      # gh CLI honors GH_TOKEN automatically; sync_flow.py uses gh for auth.
      # Without this, anonymous API requests hit GitHub's 60/hr per-IP rate
      # limit and the sync_flow dry-run test fails on shared-runner IPs.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Install WeasyPrint system libraries
        # google_report.py (and its full-audit test) imports weasyprint, which
        # needs pango/cairo native libs. Without these the test skips; with them
        # it actually exercises PDF/HTML report generation. Pango pulls glib
        # (libgobject), cairo, and harfbuzz transitively.
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Run pytest
        # Test/CI deps come from the `dev` group in pyproject.toml; uv resolves
        # them into an isolated environment. Per-script runtime deps live in
        # PEP 723 inline metadata (run scripts with `uv run scripts/<name>.py`).
        run: uv run --group dev pytest tests/ -v
